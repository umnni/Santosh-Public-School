<section class="relative overflow-hidden bg-gradient-to-br from-red-50 via-white to-green-50 py-24">

    <!-- Background Blur -->
    <div class="absolute -top-20 -left-20 w-72 h-72 bg-red-200 rounded-full blur-3xl opacity-30"></div>
    <div class="absolute -bottom-20 -right-20 w-72 h-72 bg-green-200 rounded-full blur-3xl opacity-30"></div>

    <div class="max-w-6xl mx-auto px-6">

        <div class="grid lg:grid-cols-2 gap-16 items-center">

            <!-- Left -->

            <div class="text-center lg:text-left">

                <h1 class="text-[120px] lg:text-[170px] font-black text-red-600 leading-none animate-pulse">
                    404
                </h1>

                <h2 class="text-4xl font-extrabold mt-4 text-gray-800">
                    Oops! Page Not Found
                </h2>

                <p class="mt-6 text-lg text-gray-600 leading-8">
                    Sorry, the page you are looking for doesn't exist,
                    may have been moved, or the URL is incorrect.
                </p>

                <div class="mt-10 flex flex-wrap gap-4 justify-center lg:justify-start">

                    <button
                        onclick="loadPage('home')"
                        class="bg-red-600 hover:bg-red-700 text-white px-8 py-4 rounded-xl font-semibold transition">

                        🏠 Back To Home

                    </button>

                    <button
                        onclick="history.back()"
                        class="border-2 border-green-600 text-green-700 hover:bg-green-600 hover:text-white px-8 py-4 rounded-xl font-semibold transition">

                        ← Go Back

                    </button>

                </div>

            </div>

            <!-- Right -->

            <div class="flex justify-center">

                <img
                    src="https://undraw.co/api/illustrations/404.svg"
                    alt="404"
                    class="w-full max-w-md">

            </div>

        </div>

        <!-- Quick Links -->

        <div class="mt-24 bg-white rounded-3xl shadow-xl p-10">

            <h3 class="text-2xl font-bold text-center mb-8">

                You May Be Looking For

            </h3>

            <div class="grid md:grid-cols-4 gap-6">

                <button onclick="loadPage('home')"
                    class="bg-red-50 hover:bg-red-600 hover:text-white rounded-xl p-6 transition">

                    Home

                </button>

                <button onclick="loadPage('about-us')"
                    class="bg-green-50 hover:bg-green-600 hover:text-white rounded-xl p-6 transition">

                    About Us

                </button>

                <button onclick="loadPage('admission')"
                    class="bg-red-50 hover:bg-red-600 hover:text-white rounded-xl p-6 transition">

                    Admission

                </button>

                <button onclick="loadPage('contact')"
                    class="bg-green-50 hover:bg-green-600 hover:text-white rounded-xl p-6 transition">

                    Contact

                </button>

            </div>

        </div>

    </div>

</section>
